services:
  - type: pghost
    name: ccms-db
    databaseName: campus_complaints
    user: campusapp
    plan: free

  - type: web
    name: ccms-backend
    env: docker
    dockerContext: .
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /api/stats
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: ccms-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ccms-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: ccms-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: ccms-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ccms-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 8080
      - key: FRONTEND_URL
        sync: false

  - type: static
    name: ccms-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
