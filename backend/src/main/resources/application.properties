spring.application.name=ComplaintSystem

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:campus_complaints}}
spring.datasource.username=${DB_USERNAME:campusapp}
spring.datasource.password=${DB_PASSWORD:campus123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration
jwt.secret=${JWT_SECRET:campusComplaintSystemSecretKeyForJWTTokenGenerationAndValidation2024}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server Configuration
server.port=${PORT:8080}

# Logging
logging.level.com.campus.complaint=${LOGGING_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOGGING_LEVEL_SECURITY:INFO}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=${UPLOAD_DIR:uploads}

# Email Configuration
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:b240ff7aa31a50}
spring.mail.password=${MAIL_PASSWORD:474d95f02ccc7f}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=false

# Frontend URL for verification links
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
