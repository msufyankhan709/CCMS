services:
  db:
    image: postgres:16-alpine
    container_name: campus-complaints-db
    environment:
      POSTGRES_DB: campus_complaints
      POSTGRES_USER: campusapp
      POSTGRES_PASSWORD: campus123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - campus-network
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campus-complaints-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/campus_complaints
      DB_USERNAME: campusapp
      DB_PASSWORD: campus123
      JWT_SECRET: ${JWT_SECRET:-campusComplaintSystemSecretKeyForJWTTokenGenerationAndValidation2024}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    depends_on:
      - db
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - campus-network
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    container_name: campus-complaints-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - campus-network
    restart: always

networks:
  campus-network:
    driver: bridge

volumes:
  postgres_data:
